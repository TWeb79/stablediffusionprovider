# =============================================================================
# Stable Diffusion API Service - Docker Compose
# Author: Inventions4All - github:TWeb79
# =============================================================================

services:
  41-sdprovider-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: 41-sdprovider-api
    image: 41-sdprovider-api:latest
    ports:
      - "8141:8141"
    volumes:
      # Mount individual model files to fixed container paths for consistent access
      # Default model (general purpose)
      - ${SD_MODEL_DEFAULT:-/Users/torstenweber/dev/ai/external/_Models/Stable-diffusion/dreamshaperXL_lightningDPMSDE.safetensors}:/models/default.safetensors:ro
      # Explicit content model (filtered/tuned variant)
      - ${SD_MODEL_EXPLICIT:-/Users/torstenweber/dev/ai/external/_Models/Stable-diffusion/mzui_10_of_10_dreamshaperXL_lightningDPMSDE.safetensors}:/models/explicit.safetensors:ro
    environment:
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=8141
      - API_WORKERS=1
      
      # Model Configuration
      - DEFAULT_MODEL=/models/default.safetensors
      - SAFETY_CHECKER=false
      
      # Device Configuration
      # Note: For Docker on Apple Silicon (M-series Macs), use 'cpu' as MPS is not available in Linux containers
      - DEVICE=${DEVICE:-cpu}
      - ATTENTION_SLICING=true
      - CPU_OFFLOAD=false
      
      # Generation Defaults
      - DEFAULT_STEPS=${DEFAULT_STEPS:-25}
      - DEFAULT_GUIDANCE=${DEFAULT_GUIDANCE:-7.5}
      - DEFAULT_WIDTH=${DEFAULT_WIDTH:-512}
      - DEFAULT_HEIGHT=${DEFAULT_HEIGHT:-512}
      
      # HuggingFace Token (optional, for gated models)
      - HF_TOKEN=${HF_TOKEN:-}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8141/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped
    networks:
      - 41-sdprovider-network

networks:
  41-sdprovider-network:
    driver: bridge